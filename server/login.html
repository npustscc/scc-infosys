<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SCC 資訊系統 — 登入</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", system-ui, sans-serif;
    margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: linear-gradient(180deg, #f4f6fb 0%, #e9edf5 100%);
    color: #1f2430;
  }
  .card {
    width: 100%; max-width: 380px; margin: 1rem; padding: 2rem 1.75rem;
    background: #fff; border-radius: 14px; box-shadow: 0 8px 28px rgba(30, 40, 70, .12);
  }
  h1 { font-size: 1.15rem; margin: 0 0 .3rem; text-align: center; }
  .sub { font-size: .8rem; color: #6b7280; text-align: center; margin: 0 0 1.4rem; }
  label { display: block; margin-top: .9rem; font-size: .85rem; color: #374151; }
  input[type="email"], input[type="password"], input[type="text"] {
    width: 100%; margin-top: .3rem; padding: .55rem .65rem; font-size: 1rem;
    border: 1px solid #d1d5db; border-radius: 8px; outline: none;
  }
  input:focus { border-color: #4f6ef2; box-shadow: 0 0 0 3px rgba(79,110,242,.15); }
  button {
    width: 100%; margin-top: 1.3rem; padding: .65rem; font-size: 1rem; font-weight: 600;
    border: none; border-radius: 8px; background: #4f6ef2; color: #fff; cursor: pointer;
  }
  button:hover { background: #3d5adf; }
  button:disabled { background: #9aa8e8; cursor: default; }
  button.secondary { background: transparent; color: #6b7280; font-weight: 400; margin-top: .6rem; }
  button.secondary:hover { background: #f3f4f6; }
  button.link {
    width: auto; margin: .6rem auto 0; padding: 0; display: block; background: none;
    color: #4f6ef2; font-weight: 400; font-size: .82rem; text-decoration: underline;
  }
  button.link:hover { background: none; color: #3d5adf; }
  #msg { margin-top: 1rem; font-size: .85rem; text-align: center; min-height: 1.1em; white-space: pre-wrap; }
  #msg.err { color: #c0392b; }
  #msg.ok { color: #1e8e3e; }
  .totp-box, .email-otp-box, .pw-change-box { display: none; }
  .totp-box.show, .email-otp-box.show, .pw-change-box.show { display: block; }
  .setup-box { display: none; }
  .setup-box.show { display: block; }
  .login-box.hide { display: none; }
  .email-setup-box { display: none; }
  .email-setup-box.show { display: block; }
  .key-display {
    margin-top: .8rem; padding: .7rem; background: #f5f6fa; border-radius: 8px;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 1rem;
    letter-spacing: .05em; text-align: center; word-break: break-all;
  }
  .otpauth-link { display: block; text-align: center; margin-top: .5rem; font-size: .82rem; }
  .hint { font-size: .78rem; color: #6b7280; margin-top: .5rem; line-height: 1.5; }
  .qr-wrap { display: flex; justify-content: center; margin-top: .8rem; }
  .qr-wrap canvas { image-rendering: pixelated; border: 1px solid #e5e7eb; border-radius: 4px; }
</style>
</head>
<body>
<div class="card">
  <h1>學生諮商中心資訊系統</h1>
  <p class="sub">請使用帳號密碼登入</p>

  <div id="loginBox" class="login-box">
    <form id="loginForm">
      <label>登入帳號<input type="text" name="email" required autocomplete="username" /></label>
      <label>密碼<input type="password" name="password" required autocomplete="current-password" /></label>

      <div id="totpBox" class="totp-box">
        <label>驗證器 6 位數驗證碼
          <input type="text" name="otp" inputmode="numeric" pattern="[0-9]*" maxlength="6" autocomplete="one-time-code" />
        </label>
        <button type="button" id="switchToEmailBtn" class="link">改用 Email 驗證碼</button>
      </div>

      <div id="emailOtpBox" class="email-otp-box">
        <label>Email 6 位數驗證碼（已寄至你的信箱，10 分鐘內有效）
          <input type="text" name="emailOtp" inputmode="numeric" pattern="[0-9]*" maxlength="6" autocomplete="one-time-code" />
        </label>
        <button type="button" id="resendEmailOtpBtn" class="link">重新寄送驗證碼</button>
      </div>

      <div id="pwChangeBox" class="pw-change-box">
        <p class="hint">首次登入，請先設定新密碼（至少 8 碼，且不可與預設密碼相同）。</p>
        <label>新密碼<input type="password" id="newPassword" autocomplete="new-password" /></label>
        <label>確認新密碼<input type="password" id="confirmNewPassword" autocomplete="new-password" /></label>
        <button type="button" id="confirmPwChangeBtn">確認變更密碼</button>
      </div>

      <button type="submit" id="loginBtn">登入</button>
    </form>
  </div>

  <div id="setupBox" class="setup-box">
    <p class="hint">此帳號尚未設定雙因素驗證（TOTP）。請用驗證器 App（如 Google Authenticator／Authy）
      掃描下方 QR code 或手動輸入密鑰完成設定；也可以先跳過，之後再到設定頁補設定。</p>
    <div class="qr-wrap"><canvas id="setupQrCanvas"></canvas></div>
    <a id="otpauthLink" class="otpauth-link" href="#">手機瀏覽器開啟本頁時可點此直接加入</a>
    <div class="key-display" id="manualKey">----</div>
    <label>輸入驗證器目前顯示的 6 位數碼以完成設定
      <input type="text" id="setupCode" inputmode="numeric" pattern="[0-9]*" maxlength="6" autocomplete="one-time-code" />
    </label>
    <button type="button" id="confirmBtn">確認啟用</button>
    <button type="button" id="useEmailInsteadBtn" class="secondary">我不方便用驗證器 App，改用 Email 驗證碼</button>
    <button type="button" id="skipBtn" class="secondary">稍後再說</button>
  </div>

  <div id="emailSetupBox" class="email-setup-box">
    <p class="hint">請填寫 1~3 個可收驗證碼的 Email（至少填一個，多筆可作為備援信箱）。</p>
    <label>Email 1<input type="email" id="otpEmail1" autocomplete="email" /></label>
    <label>Email 2（選填）<input type="email" id="otpEmail2" autocomplete="email" /></label>
    <label>Email 3（選填）<input type="email" id="otpEmail3" autocomplete="email" /></label>
    <button type="button" id="confirmEmailSetupBtn">確認</button>
    <button type="button" id="cancelEmailSetupBtn" class="secondary">取消</button>
  </div>

  <div id="msg"></div>
</div>

<!--
  以下這段 QR code 編碼器內嵌腳本是 server/src/util/qrcode.js 的逐字複製貼上（同一份演算法程式碼，
  只是模組包裝方式不同：該檔用 UMD 偵測 module 是否存在——瀏覽器沒有 module，故自動改掛到
  window.QRCodeGen；Node require 時則走 module.exports）。修改 QR 演算法時務必同步修改兩邊，
  或更好的做法是只改 src/util/qrcode.js 再原樣複製貼上這裡，避免兩份程式碼分岔。
-->
<script>
// server/src/util/qrcode.js — 手刻 QR code 編碼器（零外部依賴，CLAUDE.md 禁止為此新增 npm 套件，
// 含 QR code library）。忠實移植 Kazuhiko Arase 的 qrcode-generator（MIT license，
// https://github.com/kazuhikoarase/qrcode-generator，業界最常見的 vanilla-JS QR 編碼器移植來源，
// 被 davidshimjs/qrcodejs 等無數專案內嵌沿用）。Reed-Solomon 糾錯碼／BCH 格式資訊／版本資訊／
// 遮罩選擇（getLostPoint 8 種遮罩評分取最佳）皆逐字對映原演算法，不是「看起來像 QR code」的
// 簡化示意圖——尺寸/糾錯碼算錯會讓使用者掃不出來。
//
// 刻意的移植取捨（見任務回報「QR 演算法移植來源說明」）：
//   - 只做 byte mode（UTF-8 位元組模式），不做 numeric/alphanumeric/kanji 模式——本模組唯一用途是
//     TOTP 設定畫面的 otpauth:// URI（純 ASCII），不需要其餘模式節省空間的最佳化。
//   - 版本（type number）0 表示自動選擇：從 1 試到 39，選第一個裝得下資料的版本（對映原演算法
//     make() 的自動選版邏輯；原演算法本身在 1~39 都裝不下時不會再嘗試版本 40，此為原演算法既有
//     行為，非本次移植新增的限制——otpauth URI 長度遠低於版本 39 的容量上限，不受影響）。
//   - 糾錯等級固定可選 L/M/Q/H，供呼叫端指定；totpSetup 使用情境固定用 M（見 actions/totpSetup 呼叫處）。
//
// 同一份演算法程式碼須同時能被 Node（CommonJS require）與瀏覽器（server/login.html 內嵌
// <script>）使用——用 UMD 包裝（偵測 `module` 是否存在）達成「兩邊程式碼體逐字相同，只有模組
// 包裝方式不同」：login.html 內嵌的 <script> 是本檔內容的逐字複製貼上，不是另一份改寫。
'use strict';

(function (root, factory) {
  if (typeof module === 'object' && module.exports) {
    module.exports = factory();
  } else {
    root.QRCodeGen = factory();
  }
}(typeof self !== 'undefined' ? self : this, function () {
  'use strict';

  // ── QRMath：GF(256) 對數/指數表（Reed-Solomon 運算的伽羅瓦體算術基礎）──

  var QRMath = {
    glog: function (n) {
      if (n < 1) throw new Error('glog(' + n + ')');
      return QRMath.LOG_TABLE[n];
    },
    gexp: function (n) {
      while (n < 0) n += 255;
      while (n >= 256) n -= 255;
      return QRMath.EXP_TABLE[n];
    },
    EXP_TABLE: new Array(256),
    LOG_TABLE: new Array(256),
  };
  for (var qi = 0; qi < 8; qi += 1) QRMath.EXP_TABLE[qi] = 1 << qi;
  for (var qj = 8; qj < 256; qj += 1) {
    QRMath.EXP_TABLE[qj] = QRMath.EXP_TABLE[qj - 4] ^ QRMath.EXP_TABLE[qj - 5]
      ^ QRMath.EXP_TABLE[qj - 6] ^ QRMath.EXP_TABLE[qj - 8];
  }
  for (var qk = 0; qk < 255; qk += 1) QRMath.LOG_TABLE[QRMath.EXP_TABLE[qk]] = qk;

  // ── 多項式（GF(256) 係數）：Reed-Solomon 糾錯碼生成與資料多項式取模用 ──

  function qrPolynomial(num, shift) {
    if (num.length === undefined) throw new Error(num.length + '/' + shift);
    var offset = 0;
    while (offset < num.length && num[offset] === 0) offset += 1;
    var _num = new Array(num.length - offset + shift);
    for (var i = 0; i < num.length - offset; i += 1) _num[i] = num[i + offset];

    var _this = {};
    _this.getAt = function (index) { return _num[index]; };
    _this.getLength = function () { return _num.length; };
    _this.multiply = function (e) {
      var out = new Array(_this.getLength() + e.getLength() - 1);
      for (var a = 0; a < out.length; a += 1) out[a] = 0;
      for (var a2 = 0; a2 < _this.getLength(); a2 += 1) {
        for (var b = 0; b < e.getLength(); b += 1) {
          out[a2 + b] ^= QRMath.gexp(QRMath.glog(_this.getAt(a2)) + QRMath.glog(e.getAt(b)));
        }
      }
      return qrPolynomial(out, 0);
    };
    _this.mod = function (e) {
      if (_this.getLength() - e.getLength() < 0) return _this;
      var ratio = QRMath.glog(_this.getAt(0)) - QRMath.glog(e.getAt(0));
      var out = new Array(_this.getLength());
      for (var a3 = 0; a3 < _this.getLength(); a3 += 1) out[a3] = _this.getAt(a3);
      for (var a4 = 0; a4 < e.getLength(); a4 += 1) out[a4] ^= QRMath.gexp(QRMath.glog(e.getAt(a4)) + ratio);
      return qrPolynomial(out, 0).mod(e);
    };
    return _this;
  }

  // ── 常數：模式（本模組只實作 byte mode）／糾錯等級／遮罩型樣編號 ──

  var QRMode = { MODE_8BIT_BYTE: 1 << 2 };
  var QRErrorCorrectionLevel = { L: 1, M: 0, Q: 3, H: 2 };
  var QRMaskPattern = {
    PATTERN000: 0, PATTERN001: 1, PATTERN010: 2, PATTERN011: 3,
    PATTERN100: 4, PATTERN101: 5, PATTERN110: 6, PATTERN111: 7,
  };

  // ── QRUtil：BCH 格式/版本資訊編碼、對齊定位點座標表、8 種遮罩函式、遮罩評分（getLostPoint）──

  var QRUtil = (function () {
    // 版本 1~40 的對齊定位點座標（版本 1 無對齊定位點，故為空陣列）。
    var PATTERN_POSITION_TABLE = [
      [],
      [6, 18], [6, 22], [6, 26], [6, 30], [6, 34],
      [6, 22, 38], [6, 24, 42], [6, 26, 46], [6, 28, 50], [6, 30, 54], [6, 32, 58], [6, 34, 62],
      [6, 26, 46, 66], [6, 26, 48, 70], [6, 26, 50, 74], [6, 30, 54, 78], [6, 30, 56, 82], [6, 30, 58, 86], [6, 34, 62, 90],
      [6, 28, 50, 72, 94], [6, 26, 50, 74, 98], [6, 30, 54, 78, 102], [6, 28, 54, 80, 106], [6, 32, 58, 84, 110],
      [6, 30, 58, 86, 114], [6, 34, 62, 90, 118],
      [6, 26, 50, 74, 98, 122], [6, 30, 54, 78, 102, 126], [6, 26, 52, 78, 104, 130], [6, 30, 56, 82, 108, 134],
      [6, 34, 60, 86, 112, 138], [6, 30, 58, 86, 114, 142], [6, 34, 62, 90, 118, 146],
      [6, 30, 54, 78, 102, 126, 150], [6, 24, 50, 76, 102, 128, 154], [6, 28, 54, 80, 106, 132, 158],
      [6, 32, 58, 84, 110, 136, 162], [6, 26, 54, 82, 110, 138, 166], [6, 30, 58, 86, 114, 142, 170],
    ];

    // BCH(15,5) 格式資訊生成多項式 0x537、BCH(18,6) 版本資訊生成多項式 0x1F25、格式資訊遮罩 0x5412
    // ——ISO/IEC 18004 固定常數，非本次移植自行推導。
    var G15 = (1 << 10) | (1 << 8) | (1 << 5) | (1 << 4) | (1 << 2) | (1 << 1) | (1 << 0);
    var G18 = (1 << 12) | (1 << 11) | (1 << 10) | (1 << 9) | (1 << 8) | (1 << 5) | (1 << 2) | (1 << 0);
    var G15_MASK = (1 << 14) | (1 << 12) | (1 << 10) | (1 << 4) | (1 << 1);

    function getBCHDigit(data) {
      var digit = 0;
      while (data !== 0) { digit += 1; data >>>= 1; }
      return digit;
    }

    var _this = {};

    _this.getBCHTypeInfo = function (data) {
      var d = data << 10;
      while (getBCHDigit(d) - getBCHDigit(G15) >= 0) d ^= (G15 << (getBCHDigit(d) - getBCHDigit(G15)));
      return ((data << 10) | d) ^ G15_MASK;
    };

    _this.getBCHTypeNumber = function (data) {
      var d = data << 12;
      while (getBCHDigit(d) - getBCHDigit(G18) >= 0) d ^= (G18 << (getBCHDigit(d) - getBCHDigit(G18)));
      return (data << 12) | d;
    };

    _this.getPatternPosition = function (typeNumber) {
      return PATTERN_POSITION_TABLE[typeNumber - 1];
    };

    _this.getMaskFunction = function (maskPattern) {
      switch (maskPattern) {
        case QRMaskPattern.PATTERN000: return function (i, j) { return (i + j) % 2 === 0; };
        case QRMaskPattern.PATTERN001: return function (i) { return i % 2 === 0; };
        case QRMaskPattern.PATTERN010: return function (i, j) { return j % 3 === 0; };
        case QRMaskPattern.PATTERN011: return function (i, j) { return (i + j) % 3 === 0; };
        case QRMaskPattern.PATTERN100: return function (i, j) { return (Math.floor(i / 2) + Math.floor(j / 3)) % 2 === 0; };
        case QRMaskPattern.PATTERN101: return function (i, j) { return (i * j) % 2 + (i * j) % 3 === 0; };
        case QRMaskPattern.PATTERN110: return function (i, j) { return ((i * j) % 2 + (i * j) % 3) % 2 === 0; };
        case QRMaskPattern.PATTERN111: return function (i, j) { return ((i * j) % 3 + (i + j) % 2) % 2 === 0; };
        default: throw new Error('bad maskPattern:' + maskPattern);
      }
    };

    _this.getErrorCorrectPolynomial = function (errorCorrectLength) {
      var a = qrPolynomial([1], 0);
      for (var i = 0; i < errorCorrectLength; i += 1) a = a.multiply(qrPolynomial([1, QRMath.gexp(i)], 0));
      return a;
    };

    // byte mode 的「字元計數」欄位位元數：版本 1-9／10-26／27-40 各不同（ISO/IEC 18004 Table 3）。
    _this.getLengthInBits = function (type) {
      if (type >= 1 && type < 10) return 8;
      if (type < 27) return 16;
      if (type < 41) return 16;
      throw new Error('type:' + type);
    };

    // 遮罩評分（4 條規則加總，越低越好）：LEVEL1 同色相鄰、LEVEL2 2x2 同色方塊、LEVEL3
    // 類定位點的 1:1:3:1:1 樣式、LEVEL4 深色比例偏離 50% 的程度。makeImpl 會對 8 種遮罩各算一次，
    // 取最低分者，避免深色/淺色模組過度連續造成掃描辨識率下降。
    _this.getLostPoint = function (qrCode) {
      var moduleCount = qrCode.getModuleCount();
      var lostPoint = 0;

      for (var row = 0; row < moduleCount; row += 1) {
        for (var col = 0; col < moduleCount; col += 1) {
          var sameCount = 0;
          var dark = qrCode.isDark(row, col);
          for (var r = -1; r <= 1; r += 1) {
            if (row + r < 0 || moduleCount <= row + r) continue;
            for (var c = -1; c <= 1; c += 1) {
              if (col + c < 0 || moduleCount <= col + c) continue;
              if (r === 0 && c === 0) continue;
              if (dark === qrCode.isDark(row + r, col + c)) sameCount += 1;
            }
          }
          if (sameCount > 5) lostPoint += (3 + sameCount - 5);
        }
      }

      for (var row2 = 0; row2 < moduleCount - 1; row2 += 1) {
        for (var col2 = 0; col2 < moduleCount - 1; col2 += 1) {
          var count = 0;
          if (qrCode.isDark(row2, col2)) count += 1;
          if (qrCode.isDark(row2 + 1, col2)) count += 1;
          if (qrCode.isDark(row2, col2 + 1)) count += 1;
          if (qrCode.isDark(row2 + 1, col2 + 1)) count += 1;
          if (count === 0 || count === 4) lostPoint += 3;
        }
      }

      for (var row3 = 0; row3 < moduleCount; row3 += 1) {
        for (var col3 = 0; col3 < moduleCount - 6; col3 += 1) {
          if (qrCode.isDark(row3, col3) && !qrCode.isDark(row3, col3 + 1) && qrCode.isDark(row3, col3 + 2)
            && qrCode.isDark(row3, col3 + 3) && qrCode.isDark(row3, col3 + 4) && !qrCode.isDark(row3, col3 + 5)
            && qrCode.isDark(row3, col3 + 6)) {
            lostPoint += 40;
          }
        }
      }
      for (var col4 = 0; col4 < moduleCount; col4 += 1) {
        for (var row4 = 0; row4 < moduleCount - 6; row4 += 1) {
          if (qrCode.isDark(row4, col4) && !qrCode.isDark(row4 + 1, col4) && qrCode.isDark(row4 + 2, col4)
            && qrCode.isDark(row4 + 3, col4) && qrCode.isDark(row4 + 4, col4) && !qrCode.isDark(row4 + 5, col4)
            && qrCode.isDark(row4 + 6, col4)) {
            lostPoint += 40;
          }
        }
      }

      var darkCount = 0;
      for (var col5 = 0; col5 < moduleCount; col5 += 1) {
        for (var row5 = 0; row5 < moduleCount; row5 += 1) {
          if (qrCode.isDark(row5, col5)) darkCount += 1;
        }
      }
      var ratio = Math.abs(100 * darkCount / moduleCount / moduleCount - 50) / 5;
      lostPoint += ratio * 10;

      return lostPoint;
    };

    return _this;
  }());

  // ── QRRSBlock：各版本×糾錯等級的 Reed-Solomon 區塊切分表（ISO/IEC 18004 Table 9）。
  //    每列 [區塊數, 該區塊總碼字數, 該區塊資料碼字數] 重複出現（部分版本資料要切成兩種大小的區塊）。

  var QRRSBlock = (function () {
    var RS_BLOCK_TABLE = [
      [1, 26, 19], [1, 26, 16], [1, 26, 13], [1, 26, 9],
      [1, 44, 34], [1, 44, 28], [1, 44, 22], [1, 44, 16],
      [1, 70, 55], [1, 70, 44], [2, 35, 17], [2, 35, 13],
      [1, 100, 80], [2, 50, 32], [2, 50, 24], [4, 25, 9],
      [1, 134, 108], [2, 67, 43], [2, 33, 15, 2, 34, 16], [2, 33, 11, 2, 34, 12],
      [2, 86, 68], [4, 43, 27], [4, 43, 19], [4, 43, 15],

  msg.className = cls || '';
}

// 同源打 /exec（wire contract 與 dev-login.html／proxyCall 相同：urlencoded 單欄位 payload）。
async function callExec(action, params) {
  const payload = JSON.stringify(Object.assign({ action, rootFolderId: ROOT_FOLDER_ID }, params || {}));
  const body = new URLSearchParams();
  body.append('payload', payload);
  const r = await fetch('/exec', { method: 'POST', body });
  const data = await r.json();
  if (!data.success) throw new Error(data.error || '未知錯誤');
  return data.data || {};
}

function callAuthed(action, params) {
  return callExec(action, Object.assign({ sessionToken }, params || {}));
}

function redirectHome() {
  location.href = '/';
}

function updateResendLabel() {
  resendEmailOtpBtn.textContent = resendRemain > 0 ? `重新寄送驗證碼（${resendRemain} 秒）` : '重新寄送驗證碼';
}

function startResendCountdown(seconds) {
  clearInterval(resendIntervalId);
  resendRemain = seconds;
  resendEmailOtpBtn.disabled = true;
  updateResendLabel();
  resendIntervalId = setInterval(() => {
    resendRemain -= 1;
    updateResendLabel();
    if (resendRemain <= 0) {
      clearInterval(resendIntervalId);
      resendIntervalId = null;
      resendEmailOtpBtn.disabled = false;
    }
  }, 1000);
}

function stopResendCountdown() {
  clearInterval(resendIntervalId);
  resendIntervalId = null;
  resendEmailOtpBtn.disabled = false;
  updateResendLabel();
}

function showTotpBox() {
  totpBox.classList.add('show');
  emailOtpBox.classList.remove('show');
  hidePwChangeBox();
}

function showEmailOtpBox() {
  emailOtpBox.classList.add('show');
  totpBox.classList.remove('show');
  hidePwChangeBox();
}

// 首次登入強制改密碼（帳號發放與管理，migration 005）：密碼已對、只差改密碼，此時 TOTP／Email
// 驗證碼欄位還沒有意義（後端 auth/local.js 的 must_change_password 判斷擋在第二因素之前），故
// 顯示 pwChangeBox 時把另外兩個盒子都收起來，並暫時藏起主要的「登入」送出鈕（避免使用者誤按
// 原表單送出、卻沒帶 newPassword，白白再收到一次 password_change_required）。
function showPwChangeBox() {
  pwChangeBox.classList.add('show');
  totpBox.classList.remove('show');
  emailOtpBox.classList.remove('show');
  loginBtn.style.display = 'none';
}

function hidePwChangeBox() {
  pwChangeBox.classList.remove('show');
  loginBtn.style.display = '';
}

// 呼叫 sessionStart（帶目前表單的 email/password，加上呼叫端指定的額外欄位）——密碼登入流程中途
// 的每一步（輸入 TOTP、輸入 Email 驗證碼、改用 Email 驗證碼、重新寄送）都是「同一組帳密再送一次
// sessionStart」，因為後端在通過第二因素之前不會核發任何 session，前端也沒有中繼身分可用
// （見任務回報「email OTP 狀態機的邊界情況決策」）。
async function attemptLogin(extra) {
  return callExec('sessionStart', Object.assign({
    email: loginForm.email.value,
    password: loginForm.password.value,
    ua: navigator.userAgent,
  }, extra || {}));
}

// 統一處理 sessionStart 的回應（無論來自表單送出、改用 Email 驗證碼、或重新寄送按鈕）。
// 回傳 true 表示流程尚未結束（還停留在登入頁的某個中繼狀態），false 表示已經導向下一步。
async function handleAuthResponse(d) {
  if (d.error === 'password_change_required') {
    showPwChangeBox();
    setMsg('首次登入，請先設定新密碼', '');
    newPasswordInput.focus();
    return true;
  }
  if (typeof d.error === 'string' && d.error.indexOf('weak_new_password') === 0) {
    showPwChangeBox();
    setMsg(weakPasswordMessage(d.error), 'err');
    newPasswordInput.value = '';
    confirmNewPasswordInput.value = '';
    newPasswordInput.focus();
    return true;
  }
  if (d.error === 'totp_required') {
    showTotpBox();
    setMsg('請輸入驗證器目前顯示的 6 位數碼', '');
    loginForm.otp.focus();
    return true;
  }
  if (d.error === 'invalid_totp') {
    showTotpBox();
    setMsg('驗證碼錯誤，請重新輸入', 'err');
    loginForm.otp.value = '';
    loginForm.otp.focus();
    return true;
  }
  if (d.error === 'email_otp_sent') {
    showEmailOtpBox();
    setMsg('驗證碼已寄到你的信箱，請於 10 分鐘內輸入', '');
    // resent:true＝後端真的重新寄了一封新信，倒數重新從 60 秒起算；resent:false（60 秒防重寄
    // 冷卻中）則不重置既有倒數，也涵蓋「頁面剛載入、還沒有任何倒數在跑」的情況下強制起算一次。
    if (d.resent || resendIntervalId === null) startResendCountdown(60);
    loginForm.emailOtp.focus();
    return true;
  }
  if (d.error === 'invalid_email_otp') {
    showEmailOtpBox();
    setMsg('驗證碼錯誤，請重新輸入', 'err');
    loginForm.emailOtp.value = '';
    loginForm.emailOtp.focus();
    return true;
  }
  if (d.error === 'email_otp_unavailable') {
    setMsg('驗證信寄送失敗，請聯絡系統管理者', 'err');
    return true;
  }
  if (d.error === 'otp_emails_required' || d.error === 'too_many_otp_emails' || d.error === 'invalid_otp_email') {
    // 來自 switchToEmailOtp 的 otpEmails 驗證失敗——emailSetupBox 仍開著讓使用者修正，不動它的
    // 顯示狀態（見 emailSetupErrorMessage，同一套訊息也給 twofaSetMethod 的 setup 模式用）。
    setMsg(emailSetupErrorMessage(d.error), 'err');
    return true;
  }
  if (d.error === 'invalid_credentials') {
    setMsg('帳號或密碼錯誤', 'err');
    return true;
  }
  if (d.error === 'Unauthorized user') {
    setMsg('此帳號尚未取得系統使用權限，請聯絡管理者', 'err');
    return true;
  }
  if (d.error) {
    setMsg('登入失敗：' + d.error, 'err');
    return true;
  }
  if (!d.sessionToken) {
    setMsg('登入失敗：伺服器回應異常', 'err');
    return true;
  }

  // 成功：寫入與 dev-login.html 相同的 localStorage keys，未改造的前端會直接撿到 session。
  sessionToken = d.sessionToken;
  localStorage.setItem(SESSION_LS_KEY, d.sessionToken);
  const email = d.email || String(loginForm.email.value || '');
  localStorage.setItem(USER_LS_KEY, JSON.stringify({ email, name: email.split('@')[0], picture: '' }));
  stopResendCountdown();

  if (d.totpEnrolled === false) {
    // 尚未註冊 TOTP：先引導設定（可跳過，強制政策留待 Phase 3b 信任裝置一起收緊）。
    await enterSetupFlow();
  } else {
    setMsg('登入成功，正在跳轉…', 'ok');
    redirectHome();
  }
  return false;
}

loginForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  loginBtn.disabled = true;
  setMsg('登入中…');
  try {
    const d = await attemptLogin({ otp: loginForm.otp.value || '', emailOtp: loginForm.emailOtp.value || '' });
    await handleAuthResponse(d);
  } catch (err) {
    setMsg('登入失敗：' + err.message, 'err');
  } finally {
    loginBtn.disabled = false;
  }
});

// 收集 emailSetupBox 三個輸入欄的值：trim、濾掉空白欄位（後端 normalizeOtpEmails 也會做同樣的
// trim/去空/去重/小寫正規化，這裡不重複做完整驗證，只負責「湊出陣列」，格式對錯交給後端判斷）。
function collectOtpEmails() {
  return [otpEmail1.value, otpEmail2.value, otpEmail3.value]
    .map((v) => v.trim())
    .filter(Boolean);
}

// 開啟 emailSetupBox：mode 決定確認後的行為（見上方 emailSetupMode 變數說明），prefillEmail 帶入
// 第一欄預設值（switch 模式帶目前登入表單填的帳號 email；setup 模式同理，因為 loginForm 雖被
// loginBox.hide 藏起來，DOM 值仍保留）。
function openEmailSetupBox(mode, prefillEmail) {
  emailSetupMode = mode;
  totpBox.classList.remove('show');
  otpEmail1.value = prefillEmail || '';
  otpEmail2.value = '';
  otpEmail3.value = '';
  emailSetupBox.classList.add('show');
  setMsg('');
  otpEmail1.focus();
}

// 「改用 Email 驗證碼」（totpBox 內）：登入尚在中途（密碼已對、還沒通過第二因素，沒有
// session）——先讓使用者填 1~3 個收件信箱，確認後才真正送出 switchToEmailOtp（見下方
// confirmEmailSetupBtn），讓 sessionStart 這一次呼叫順便把 twofa_method 切成 'email'、
// otp_emails 存好並立刻寄送驗證碼——見 auth/local.js 的 switchToEmailOtp 參數與其檔頭註解，
// 這是專為此雞生蛋問題設計的參數。
switchToEmailBtn.addEventListener('click', () => {
  openEmailSetupBox('switch', loginForm.email.value);
});

resendEmailOtpBtn.addEventListener('click', async () => {
  if (resendEmailOtpBtn.disabled) return;
  setMsg('重新寄送中…');
  try {
    const d = await attemptLogin({});
    await handleAuthResponse(d);
  } catch (err) {
    setMsg('寄送失敗：' + err.message, 'err');
  }
});

// QR code 繪製：留白（quiet zone）至少 4 模組寬是 ISO/IEC 18004 建議值，缺這圈留白手機相機／
// 驗證器 App 常常掃不到——不是裝飾，是可辨識度的一部分。
function renderQrToCanvas(canvas, text) {
  const result = QRCodeGen.generate(text, 'M');
  const n = result.moduleCount;
  const margin = 4;
  const scale = Math.max(4, Math.floor(220 / (n + margin * 2)));
  const size = (n + margin * 2) * scale;
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, size, size);
  ctx.fillStyle = '#000000';
  for (let r = 0; r < n; r += 1) {
    for (let c = 0; c < n; c += 1) {
      if (result.matrix[r][c]) ctx.fillRect((c + margin) * scale, (r + margin) * scale, scale, scale);
    }
  }
}

async function enterSetupFlow() {
  setMsg('');
  loginBox.classList.add('hide');
  setupBox.classList.add('show');
  try {
    const d = await callAuthed('totpSetupStart', {});
    otpauthLink.href = d.otpauthUri;
    manualKeyEl.textContent = d.manualKey;
    renderQrToCanvas(setupQrCanvas, d.otpauthUri);
  } catch (err) {
    setMsg('無法產生驗證器設定：' + err.message, 'err');
  }
}

confirmBtn.addEventListener('click', async () => {
  const code = setupCode.value.trim();
  if (!/^\d{6}$/.test(code)) { setMsg('請輸入 6 位數驗證碼', 'err'); return; }
  confirmBtn.disabled = true;
  setMsg('確認中…');
  try {
    const d = await callAuthed('totpSetupConfirm', { code });
    if (d.error) {
      setMsg(d.error === 'invalid_totp' ? '驗證碼錯誤，請重新輸入' : '設定失敗：' + d.error, 'err');
      confirmBtn.disabled = false;
      return;
    }
    setMsg('雙因素驗證設定完成，正在跳轉…', 'ok');
    redirectHome();
  } catch (err) {
    setMsg('設定失敗：' + err.message, 'err');
    confirmBtn.disabled = false;
  }
});

// 「我不方便用驗證器 App，改用 Email 驗證碼」（setupBox 內）：此時已有完整 session
// （sessionToken 已賦值，setupBox 只會在登入成功、totpEnrolled===false 之後才顯示）——同樣先讓
// 使用者填 1~3 個收件信箱，確認後直接呼叫已授權的 twofaSetMethod 即可，不需要像 totpBox 那樣繞
// switchToEmailOtp 參數。
useEmailInsteadBtn.addEventListener('click', () => {
  openEmailSetupBox('setup', loginForm.email.value);
});

skipBtn.addEventListener('click', () => {
  redirectHome();
});

// emailSetupBox 確認：依 emailSetupMode 決定要嘛帶著帳密重打一次 sessionStart（switch 模式，
// 登入尚在中途沒有 session），要嘛直接呼叫已授權的 twofaSetMethod（setup 模式，已有 session）。
confirmEmailSetupBtn.addEventListener('click', async () => {
  const emails = collectOtpEmails();
  if (emails.length === 0) { setMsg('請至少填一個 Email', 'err'); return; }
  confirmEmailSetupBtn.disabled = true;
  setMsg(emailSetupMode === 'switch' ? '切換中…' : '設定中…');
  try {
    if (emailSetupMode === 'switch') {
      const d = await attemptLogin({ switchToEmailOtp: true, otpEmails: emails });
      await handleAuthResponse(d);
    } else {
      const d = await callAuthed('twofaSetMethod', { method: 'email', emails });
      if (d.error) {
        setMsg(emailSetupErrorMessage(d.error), 'err');
        return;
      }
      emailSetupBox.classList.remove('show');
      setMsg('已改用 Email 驗證碼，正在跳轉…', 'ok');
      redirectHome();
    }
  } catch (err) {
    setMsg('設定失敗：' + err.message, 'err');
  } finally {
    confirmEmailSetupBtn.disabled = false;
  }
});

// otp_emails 正規化失敗的三種代碼（見 auth/local.js normalizeOtpEmails／actions/twofa.js）
// 對映成中文訊息，比照既有 totp_required／invalid_totp 前端寫死中文對映的風格。
function emailSetupErrorMessage(errorCode) {
  if (errorCode === 'otp_emails_required') return '請至少填一個 Email';
  if (errorCode === 'too_many_otp_emails') return '最多只能填 3 個 Email';
  if (errorCode === 'invalid_otp_email') return 'Email 格式不正確，請檢查';
  return '設定失敗：' + errorCode;
}

cancelEmailSetupBtn.addEventListener('click', () => {
  emailSetupBox.classList.remove('show');
  setMsg('');
  if (emailSetupMode === 'switch') totpBox.classList.add('show');
  emailSetupMode = null;
});

// weak_new_password:<reason> 的三種 reason（見 auth/local.js validateNewPassword）對映成中文訊息，
// 後端才是權威判斷（本檔下方 confirmPwChangeBtn 只做同規則的前端提前擋，減少一次無謂的往返）。
function weakPasswordMessage(errorCode) {
  const reason = errorCode.indexOf(':') >= 0 ? errorCode.slice(errorCode.indexOf(':') + 1) : '';
  if (reason === 'too_short') return '新密碼至少需要 8 碼';
  if (reason === 'same_as_default') return '新密碼不可與預設密碼相同';
  if (reason === 'same_as_old') return '新密碼不可與目前密碼相同';
  return '新密碼不符合規則：' + reason;
}

// 首次登入強制改密碼：前端先做同一套規則的擋（≥8 碼、不可為預設密碼 123456789），減少一次
// 無謂往返；後端 auth/local.js validateNewPassword 才是權威判斷（額外還會擋「與目前密碼相同」，
// 前端沒有舊密碼雜湊可比對，這條規則只能靠後端擋）。成功後這次 sessionStart 回應會自然落在
// 下一個中繼狀態（totp_required／email_otp_sent／ok 皆有可能，取決於該帳號的第二因素設定），
// 交給 handleAuthResponse 統一處理，不需要在這裡另外分岔。
confirmPwChangeBtn.addEventListener('click', async () => {
  const pw1 = newPasswordInput.value;
  const pw2 = confirmNewPasswordInput.value;
  if (pw1.length < 8) { setMsg('新密碼至少需要 8 碼', 'err'); return; }
  if (pw1 === '123456789') { setMsg('新密碼不可與預設密碼相同', 'err'); return; }
  if (pw1 !== pw2) { setMsg('兩次輸入的新密碼不一致', 'err'); return; }
  confirmPwChangeBtn.disabled = true;
  setMsg('變更中…');
  try {
    const d = await attemptLogin({
      newPassword: pw1, otp: loginForm.otp.value || '', emailOtp: loginForm.emailOtp.value || '',
    });
    hidePwChangeBox();
    await handleAuthResponse(d);
  } catch (err) {
    setMsg('變更失敗：' + err.message, 'err');
  } finally {
    confirmPwChangeBtn.disabled = false;
  }
});
</script>
</body>
</html>
