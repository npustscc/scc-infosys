<!DOCTYPE html>
<html lang="zh-TW">
<head><meta charset="UTF-8"><title>授權完成</title></head>
<body>
<script>
  var p = new URLSearchParams(window.location.search);
  var code = p.get('code'), state = p.get('state'), err = p.get('error');
  if (err) {
    document.write('<h3 style="font-family:sans-serif;color:#dc2626;text-align:center;margin-top:60px">❌ 授權失敗：' + err + '</h3>');
  } else if (code && window.opener) {
    window.opener.postMessage({ type: 'npust5_oauth', code: code, state: state }, '*');
    document.write('<h3 style="font-family:sans-serif;color:#059669;text-align:center;margin-top:60px">✅ 授權成功，此視窗即將關閉…</h3>');
    setTimeout(function(){ window.close(); }, 1500);
  } else {
    document.write('<h3 style="font-family:sans-serif;color:#dc2626;text-align:center;margin-top:60px">❌ 缺少授權碼，請重試。</h3>');
  }
</script>
</body>
</html>
